version: '3.8'

services:
  agribot:
    build: .
    container_name: agribot-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      # Optional: override config values here
      - AGRIBOT_GROUNDING_MODE=strict
      - AGRIBOT_CORS_ORIGINS=http://localhost:5173,http://localhost:8000
    restart: unless-stopped
    # If using GPU for llama.cpp:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
